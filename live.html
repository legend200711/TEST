<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shadow Nexus Live 🔴</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0B1F3A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="stylesheet" href="live.css">
</head>
<body>

<!-- ══════════════════════════════════════════════
     LOADING — shown while Firebase auth resolves
     ══════════════════════════════════════════════ -->
<div id="liveLoading">
  <div class="ll-spinner"></div>
  <div class="ll-text">Connecting to Shadow Nexus Live…</div>
</div>


<!-- ══════════════════════════════════════════════
     CREATOR SETUP — camera preview + Go Live button
     ══════════════════════════════════════════════ -->
<div id="liveSetup" aria-label="Live Setup Screen">
  <div class="setup-inner">

    <!-- Logo / brand -->
    <div class="setup-logo">🌑</div>
    <h1 class="setup-title">Shadow Nexus Live</h1>
    <p class="setup-sub">Preview your camera before going live</p>

    <!-- Camera preview -->
    <div class="setup-preview-wrap">
      <video id="setupPreview" autoplay muted playsinline></video>
      <div class="setup-preview-off" id="setupPreviewOff">
        <div class="setup-preview-off-icon">📷</div>
        <span>Camera is off</span>
      </div>
    </div>

    <!-- Camera / Mic / Flip controls -->
    <div class="setup-controls">

      <button class="setup-ctrl-btn" id="setupBtnCam" aria-label="Toggle camera">
        <span class="setup-ctrl-icon">📷</span>
        <span>Cam</span>
      </button>

      <button class="setup-ctrl-btn" id="setupBtnMic" aria-label="Toggle microphone">
        <span class="setup-ctrl-icon">🎤</span>
        <span>Mic</span>
      </button>

      <button class="setup-ctrl-btn" id="setupBtnFlip" aria-label="Flip camera">
        <span class="setup-ctrl-icon">🔄</span>
        <span>Flip</span>
      </button>

    </div>

    <!-- Live title -->
    <input
      id="setupTitleInput"
      class="setup-input"
      type="text"
      placeholder="What are you streaming today? (optional)"
      maxlength="80"
    >

    <!-- Go Live -->
    <button id="btnGoLive" class="setup-go-live-btn" aria-label="Start live stream">
      <span class="go-live-dot"></span>
      Start Live
    </button>

    <!-- Back link -->
    <a href="index.html" style="font-size:13px;color:#3a6a9a;text-decoration:none;margin-top:-8px;">
      ← Back to Feed
    </a>

  </div>
</div>


<!-- ══════════════════════════════════════════════
     LIVE STAGE — fullscreen video + overlay controls
     Shared by creator and viewer.
     ══════════════════════════════════════════════ -->
<div id="liveStage" role="main" aria-label="Live Stream">

  <!-- Main video -->
  <div class="live-video-wrap">

    <video
      id="liveVideo"
      autoplay
      playsinline
      muted
      aria-label="Live stream video"
    ></video>

    <!-- Tap-to-unmute prompt (viewer only, shown until user taps) -->
    <div id="liveUnmutePrompt" style="
      display:none;position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      background:rgba(0,0,0,0.72);border:1px solid rgba(255,255,255,0.2);
      border-radius:14px;padding:14px 24px;text-align:center;
      font-size:14px;color:#fff;cursor:pointer;z-index:25;
      backdrop-filter:blur(6px);white-space:nowrap;
    ">
      🔊 Tap to unmute
    </div>

    <!-- Camera-off overlay (creator only) -->
    <div id="liveCamOffOverlay" class="live-cam-off-overlay">
      <div class="live-cam-off-icon">📷</div>
      <span style="font-size:13px;color:#3a5a7a;">Camera is paused</span>
    </div>

    <!-- Connection status banner (viewer only) -->
    <div id="liveConnBanner" class="live-conn-banner">
      <div id="liveConnTitle" class="live-conn-title">Connecting…</div>
      <div id="liveConnSub"   class="live-conn-sub"></div>
    </div>

    <!-- ── Top overlay bar ── -->
    <div id="liveTopBar" class="live-top-bar">

      <!-- LIVE badge -->
      <div class="live-badge" id="liveBadge">
        <span class="live-badge-dot"></span>
        LIVE
      </div>

      <!-- Creator info pill -->
      <div class="live-creator-pill">
        <div id="liveCreatorAvatar" class="live-creator-avatar"></div>
        <div id="liveCreatorName"   class="live-creator-name">Shadow Nexus</div>
      </div>

      <!-- Viewer count -->
      <div class="live-viewer-count" id="liveViewerCount">👁 0</div>

      <!-- Close / End button -->
      <button
        id="liveCloseBtn"
        class="live-close-btn"
        aria-label="End / Leave stream"
      >✕</button>

    </div>

    <!-- ── Stats ribbon (likes) ── -->
    <div class="live-stats-ribbon">
      <div class="live-stat-pill" id="liveLikeCount">❤️ 0</div>
    </div>

    <!-- ── Chat panel (both creator and viewer) ── -->
    <div class="live-chat-panel" aria-label="Live Chat">
      <div id="liveChatMessages" class="live-chat-messages" aria-live="polite"></div>
      <div class="live-chat-input-row">
        <input
          id="liveChatInput"
          class="live-chat-input"
          type="text"
          placeholder="Say something…"
          maxlength="200"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
        <button id="liveChatSend" class="live-chat-send" aria-label="Send chat message">➤</button>
      </div>
    </div>

    <!-- ═══════════════════════════════════
         GUEST VIDEO GRID — host video + guest boxes
         Shown on top of (or replacing) the main video
         ═══════════════════════════════════ -->
    <div id="guestGrid" class="guest-grid"></div>

    <!-- ═══════════════════════════════════
         HOST: incoming request notifications
         ═══════════════════════════════════ -->
    <div id="guestRequestQueue" class="guest-request-queue"></div>

    <!-- ═══════════════════════════════════
         CREATOR CONTROLS (bottom bar)
         Hidden for viewers via CSS
         ═══════════════════════════════════ -->
    <div class="live-bottom-bar">

      <button id="btnToggleCam" class="live-ctrl-btn" aria-label="Toggle camera" title="Camera">📷</button>
      <button id="btnToggleMic" class="live-ctrl-btn" aria-label="Toggle microphone" title="Mic">🎤</button>
      <button id="btnFlipCam"   class="live-ctrl-btn" aria-label="Flip camera" title="Flip">🔄</button>
      <button id="btnFullscreen" class="live-ctrl-btn" aria-label="Fullscreen" title="Fullscreen">⛶</button>
      <button id="btnShareLiveCreator" class="live-ctrl-btn" aria-label="Share live stream" title="Share">📤</button>

      <!-- Layout button (host only) — one button that opens all layout settings -->
      <button id="btnLayoutSettings" class="live-ctrl-btn guest-layout-btn" aria-label="Layout settings" title="Layout">⊞</button>

      <button id="btnEndLive"   class="live-ctrl-btn" aria-label="End live stream">END LIVE</button>

    </div>

    <!-- ═══════════════════════════════════
         LAYOUT SETTINGS PANEL (host only)
         ═══════════════════════════════════ -->
    <div id="layoutSettingsPanel" class="layout-settings-panel" style="display:none;">
      <div class="layout-panel-title">Layout Settings</div>
      <div class="layout-panel-grid">
        <button class="layout-option-btn active" data-layout="auto" title="Auto">
          <span class="layout-icon">✦</span>
          <span>Auto</span>
        </button>
        <button class="layout-option-btn" data-layout="host-full" title="Host Full">
          <span class="layout-icon">⬛</span>
          <span>Host Full</span>
        </button>
        <button class="layout-option-btn" data-layout="split" title="Split">
          <span class="layout-icon">⬜⬜</span>
          <span>Split</span>
        </button>
        <button class="layout-option-btn" data-layout="host-big" title="Host Big">
          <span class="layout-icon">▬▪</span>
          <span>Host Big</span>
        </button>
        <button class="layout-option-btn" data-layout="grid" title="Grid">
          <span class="layout-icon">▦</span>
          <span>Grid</span>
        </button>
        <button class="layout-option-btn" data-layout="float" title="Floating">
          <span class="layout-icon">◈</span>
          <span>Float</span>
        </button>
      </div>
      <div class="layout-panel-section">Box Size</div>
      <div class="layout-size-row">
        <button class="layout-size-btn active" data-size="sm">S</button>
        <button class="layout-size-btn" data-size="md">M</button>
        <button class="layout-size-btn" data-size="lg">L</button>
      </div>
    </div>

    <!-- ═══════════════════════════════════
         VIEWER ACTIONS (bottom-right)
         Hidden for creator via CSS
         ═══════════════════════════════════ -->
    <div class="live-viewer-actions">

      <button id="btnCreatorProfile" class="live-profile-btn" aria-label="View creator profile">
        <span class="live-profile-icon">👤</span>
        Profile
      </button>

      <button id="btnShareLive" class="live-share-btn" aria-label="Share live stream">
        <span class="live-share-icon">📤</span>
        Share
      </button>

      <button id="btnLike" class="live-like-btn" aria-label="Like stream">
        <span class="live-like-icon">❤️</span>
        <span id="likeBtnCount">Like</span>
      </button>

      <!-- Request a Box button (viewer only) -->
      <button id="btnRequestBox" class="live-request-box-btn" aria-label="Request a guest box">
        <span style="font-size:18px;line-height:1;">📺</span>
        <span id="btnRequestBoxLabel">Request a Box</span>
      </button>

      <!-- Guest cam/mic controls (shown only when viewer is in a guest box) -->
      <button id="btnGuestCam" class="live-request-box-btn" aria-label="Toggle guest camera" style="display:none;">
        <span style="font-size:18px;line-height:1;">📷</span>
        <span id="btnGuestCamLabel">Cam</span>
      </button>
      <button id="btnGuestMic" class="live-request-box-btn" aria-label="Toggle guest microphone" style="display:none;">
        <span style="font-size:18px;line-height:1;">🎤</span>
        <span id="btnGuestMicLabel">Mic</span>
      </button>

    </div>

  </div><!-- .live-video-wrap -->

</div><!-- #liveStage -->


<!-- ══════════════════════════════════════════════
     STREAM ENDED OVERLAY
     ══════════════════════════════════════════════ -->
<div id="liveEndedOverlay">
  <div class="ended-icon">🌑</div>
  <h2 id="endedTitle" class="ended-title">Stream Ended</h2>
  <p  id="endedSub"   class="ended-sub">This live stream has ended.</p>
  <button id="endedBackBtn" class="ended-back-btn">← Back to Feed</button>
</div>


<!-- ══════════════════════════════════════════════
     TOAST NOTIFICATION
     ══════════════════════════════════════════════ -->
<div id="liveToast" role="alert" aria-live="assertive"></div>


<!-- ══════════════════════════════════════════════
     LIVE ENGINE (ES module)
     ══════════════════════════════════════════════ -->
<script type="module" src="live.js"></script>

</body>
</html>
